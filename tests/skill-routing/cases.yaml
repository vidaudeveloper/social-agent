# 分层技能路由评测用例
# 运行：npm run skill-routing:eval
# 字段：
#   user / expect_domain / expect_intent / expect_route_status / expect_workflow_scope
#   expect_chain / expect_skills / forbid_skills / expect_schedule / capability_gap
#   needs_clarification / forbid_actions / forbid_context / recall_any / strict_top1

# --- full-workflow ---

