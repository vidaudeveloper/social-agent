# 技能路由评测用例

# 运行：npm run skill-routing:eval
# 每条：user 用户原话；expect_intent 四类意图；expect_skills 期望叶子 name 列表；
#       forbid_skills 禁止误选；keywords 可选加分词（用于离线路由打分）

- id: pipeline-full-1
  user: 今日选题，帮我跑一篇内容发到各平台
  expect_intent: content-pipeline
  expect_skills: [pipeline-orchestrator]
  forbid_skills: [xhs-publish, yt-publish, yt-post-analytics]

- id: pipeline-full-2
  user: 全自动流水线，从选题到分发
  expect_intent: content-pipeline
  expect_skills: [pipeline-orchestrator]
  forbid_skills: [xhs-research]

- id: pipeline-multi-platform
  user: 这篇稿同时发小红书和知乎
  expect_intent: content-pipeline
  expect_skills: [pipeline-orchestrator]
  forbid_skills: [xhs-publish]

- id: publish-xhs-only
  user: 只发小红书，图文已经准备好了
  expect_intent: publish-single
  expect_skills: [xhs-publish]
  forbid_skills: [pipeline-orchestrator, xhs-research, xhs-post-analytics]

- id: publish-xhs-upload
  user: 把这个视频上传发布到小红书
  expect_intent: publish-single
  expect_skills: [xhs-publish]
  forbid_skills: [pipeline-orchestrator, xhs-card-render]

- id: publish-yt-only
  user: 只发 YouTube，MP4 在这 D:\videos\demo.mp4
  expect_intent: publish-single
  expect_skills: [yt-publish]
  forbid_skills: [pipeline-orchestrator, yt-viral-research, yt-post-analytics]

- id: publish-yt-upload
  user: 上传这个视频到 YouTube 频道
  expect_intent: publish-single
  expect_skills: [yt-publish]
  forbid_skills: [yt-viral-discover]

- id: publish-x-tweet
  user: 发一条推，文案写好了
  expect_intent: publish-single
  expect_skills: [x-publish]
  forbid_skills: [pipeline-orchestrator, x-auth]
  keywords: [发推, 推特, tweet]

- id: publish-x-twitter
  user: post this to X / Twitter
  expect_intent: publish-single
  expect_skills: [x-publish]
  forbid_skills: [pipeline-orchestrator]

- id: publish-zhihu
  user: 只发知乎，文章路径有了
  expect_intent: publish-single
  expect_skills: [zh-publish]
  forbid_skills: [pipeline-orchestrator]

- id: publish-reddit
  user: 帮我把这篇发到 Reddit
  expect_intent: publish-single
  expect_skills: [rd-publish]
  forbid_skills: [pipeline-orchestrator]

- id: publish-wechat-draft
  user: 公众号进草稿，不要直接发
  expect_intent: publish-single
  expect_skills: [wechat-publish]
  forbid_skills: [pipeline-orchestrator]

- id: publish-tt
  user: 只发 TikTok 这个竖屏视频
  expect_intent: publish-single
  expect_skills: [tt-publish]
  forbid_skills: [pipeline-orchestrator]

- id: analytics-yt-channel
  user: 看下我 YouTube 频道上周播放和观看时长
  expect_intent: analytics-post
  expect_skills: [yt-post-analytics]
  forbid_skills: [yt-publish, yt-viral-research, pipeline-orchestrator]

- id: analytics-yt-report
  user: YouTube Analytics 报表落盘 HTML
  expect_intent: analytics-post
  expect_skills: [yt-post-analytics]
  forbid_skills: [yt-viral-discover, yt-publish]

- id: analytics-xhs-post
  user: 小红书发后复盘，创作者中心导出的数据
  expect_intent: analytics-post
  expect_skills: [xhs-post-analytics]
  forbid_skills: [xhs-research, xhs-publish, pipeline-orchestrator]

